# Default synthetic experiment configuration.
experiment_name: default
seed: 0

data:
  n_images: 200
  image_size: 256
  n_train: 120
  n_test: 80
  phantom: ellipses        # ellipses | shepp_logan
  min_ellipses: 3
  max_ellipses: 8

measurement:
  noise_std: 0.005         # std of complex Gaussian frequency-domain noise

mask:
  sampling_fraction: 0.25
  center_fraction: 0.02    # fraction of the budget forced onto the frequency-domain center
  variable_density_decay: 3.0
  types:                   # masks compared by scripts/07_compare_all_masks.py
    - uniform_random
    - variable_density
    - equispaced_lines
    - aopt_greedy
    - artifact_aware_greedy

greedy:
  # Invariant: the selection criterion's noise variance defaults to
  # measurement.noise_std ** 2 (the simulated noise). Set greedy.noise_var
  # here only to deliberately override that single source of truth.
  artifact_beta: 0.5       # weight of the PSF max-sidelobe penalty
  n_candidates: 32         # candidate locations evaluated per artifact-aware step

recon:
  ridge_lambda: 0.05
  wavelet_ista:
    threshold: 0.02
    n_iters: 50
    wavelet: db4
    levels: 3
    final_dc: true

outputs:
  n_examples: 5
